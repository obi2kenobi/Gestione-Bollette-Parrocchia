<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root{
    --bg:#F3F1EC; --panel:#FBFAF6; --ink:#23302E; --inkSoft:#5C6B68;
    --line:#DAD6CB; --verde:#3E6B5E; --verdeDk:#2C4F45; --ambra:#C8841E;
    --ambraSoft:#F4E3C4; --gas:#3D6A8C; --rosso:#B0492F;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --body:"Inter","Segoe UI",system-ui,sans-serif;
    --mono:"SFMono-Regular",Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body)}
  header{background:var(--verdeDk);color:#F3F1EC;border-bottom:3px solid var(--ambra)}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}
  .htop{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:24px 20px 20px;flex-wrap:wrap}
  .kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ambraSoft);margin-bottom:6px}
  h1{margin:0;font-family:var(--serif);font-size:30px;font-weight:600}
  .stato{font-family:var(--mono);font-size:12px;color:#C9D6D1;text-align:right;line-height:1.7}
  nav{display:flex;gap:4px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:14px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--inkSoft);font-weight:500;font-size:14.5px;cursor:pointer;font-family:inherit}
  .tab.on{color:var(--ink);font-weight:600;border-bottom-color:var(--verde)}
  main{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
  h2{font-family:var(--serif);font-size:20px;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:28px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card .nome{font-weight:600;font-size:15px}
  .card .cf{font-family:var(--mono);font-size:12px;color:var(--inkSoft);margin-top:4px}
  .card .conta{margin-top:10px;font-size:13px}
  .conta .el{color:var(--ambra);font-weight:600} .conta .ga{color:var(--gas);font-weight:600} .conta .ac{color:var(--verde);font-weight:600}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px}
  th{background:var(--verdeDk);color:#fff;text-align:left;padding:11px 14px;font-size:12.5px;font-weight:600}
  td{padding:11px 14px;border-top:1px solid var(--line);vertical-align:top}
  .pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11.5px;font-weight:600}
  .pill.el{background:var(--ambraSoft);color:#6e4a10} .pill.ga{background:#D9E6EE;color:#234} .pill.ac{background:#DCEBE5;color:#1f4}
  .mono{font-family:var(--mono)}
  .center{display:grid;place-items:center;min-height:60vh;color:var(--inkSoft);text-align:center;padding:20px}
  .soft{color:var(--inkSoft);font-size:13px}
  .avviso{background:var(--ambraSoft);border:1px solid #E7CE9E;border-radius:12px;padding:14px 18px;color:#6e4a10;font-size:13.5px;margin-bottom:18px}
  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-family:inherit}
  .btn.pri{background:var(--verde);color:#fff;border-color:var(--verde)}
  .btn.dk{background:var(--verdeDk);color:#fff;border-color:var(--verdeDk)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .form{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:20px}
  .form .riga{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:14px}
  label.f{display:block;font-size:12.5px;font-weight:600;color:var(--inkSoft);margin-bottom:6px}
  .inp{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit}
  a.link{color:var(--gas);text-decoration:none;font-weight:600}
  .iconbtn{background:none;border:none;cursor:pointer;color:var(--inkSoft);font-size:14px;padding:4px 6px;font-family:inherit}
  .iconbtn.del{color:var(--rosso)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .v{font-family:var(--serif);font-size:26px;font-weight:600;line-height:1.1}
  .kpi .l{font-size:12px;color:var(--inkSoft);margin-top:4px}
  .subnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
  .subtab{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--inkSoft);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .subtab.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .blocco{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .blocco h3{font-family:var(--serif);font-size:16px;margin:0 0 14px}
  .barrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .barlab{width:34%;min-width:120px;color:var(--ink)}
  .bartrack{flex:1;background:#ECE8DE;border-radius:6px;height:16px;overflow:hidden}
  .bar{height:100%;border-radius:6px}
  .barval{width:96px;text-align:right;font-family:var(--mono);font-size:12.5px;font-weight:600}
  .azione{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .azione:first-child{border-top:none}
  .azione .ico{font-size:16px;line-height:1.3}
  .azione .txt{flex:1}
  .azione .meta{font-size:12px;color:var(--inkSoft);margin-top:2px}
  .tag{display:inline-block;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:6px}
  .tag.r{background:#F2DCD4;color:#8a2a16}.tag.a{background:#F4E3C4;color:#6e4a10}.tag.g{background:#DCEBE5;color:#1f5e3a}
  .fatta{opacity:.5;text-decoration:line-through}
</style>
</head>
<body>
  <div id="boot" class="center">
    <div>
      <div style="font-family:var(--serif);font-size:20px;color:var(--ink)">Apertura dell'archivio…</div>
      <div class="soft" style="margin-top:8px">Sto leggendo i dati dal Foglio Google.</div>
    </div>
  </div>
  <div id="app" style="display:none">
    <header>
      <div class="htop">
        <div>
          <div class="kicker">Registro centralizzato &middot; Energia &amp; Gas</div>
          <h1>Gestione Utenze</h1>
        </div>
        <div class="stato">archivio su Google Apps Script<br><span style="color:var(--ambraSoft)" id="statoSync">caricato</span></div>
      </div>
      <nav class="wrap" id="nav"></nav>
    </header>
    <main id="main"></main>
  </div>
<script>
  var STATO=null, TAB="utenze", FORM=null, VERSIONE=0, CONSVISTA="spesa";
  var TABS=[{id:"utenze",label:"Utenze"},{id:"bollette",label:"Bollette"},{id:"consumi",label:"Analisi consumi"},{id:"azioni",label:"Azioni aperte"}];
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function uid(){return 'b-'+Date.now()+'-'+Math.floor(Math.random()*100000);}
  function eur(v){var n=parseFloat(v);return isNaN(n)?"—":n.toLocaleString("it-IT",{style:"currency",currency:"EUR"});}
  function statoSync(t){var e=document.getElementById("statoSync"); if(e)e.textContent=t;}
  function tipoBreve(t){return t==="gas"?"Gas":t==="acqua"?"Acqua":"El.";}
  function nBollette(uid){return STATO.bollette.filter(function(b){return b.utenza===uid;}).length;}
  function utenzaLabel(id){if(!id)return "⚠ DA ABBINARE"; var u=STATO.utenze.filter(function(x){return x.id===id;})[0]; return u?(u.luogo+" · "+tipoBreve(u.tipo)):"⚠ DA ABBINARE";}
  function utenzaTipo(id){var u=STATO.utenze.filter(function(x){return x.id===id;})[0]; return u?u.tipo:"";}
  function unitaDi(tipo){return tipo==="gas"?"Smc":tipo==="acqua"?"mc":"kWh";}
  function dataIT(s){if(!s)return "—"; var p=String(s).split("-"); return p.length===3?(p[2]+"/"+p[1]+"/"+p[0]):s;}
  function numIT(v){var n=parseFloat(v); return isNaN(n)?"—":n.toLocaleString("it-IT",{maximumFractionDigits:2});}
  function oggiISO(){var d=new Date(); function p(n){return n<10?"0"+n:""+n;} return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
  function isScaduta(b){return !b.pagata && b.scadenza && b.scadenza < oggiISO();}
  function togglePagata(id){var b=STATO.bollette.filter(function(x){return x.id===id;})[0]; if(b){b.pagata=!b.pagata; salvaTutto(); render();}}

  function avvia(){ google.script.run.withSuccessHandler(onCaricato).withFailureHandler(onErrore).apiStato(); }
  function onCaricato(resp){
    var json=resp&&resp.dati; VERSIONE=(resp&&resp.versione)||0;
    try{STATO=json?JSON.parse(json):null;}catch(e){STATO=null;}
    if(!STATO){STATO={intestatari:[],utenze:[],bollette:[],azioni:[]};}
    STATO.intestatari=STATO.intestatari||[]; STATO.utenze=STATO.utenze||[];
    STATO.bollette=STATO.bollette||[]; STATO.azioni=STATO.azioni||[];
    document.getElementById("boot").style.display="none";
    document.getElementById("app").style.display="block";
    renderNav(); render();
  }
  function onErrore(err){
    document.getElementById("boot").innerHTML='<div><div style="font-family:var(--serif);font-size:20px;color:var(--rosso)">Errore di lettura</div><div class="soft" style="margin-top:8px">'+esc(err&&err.message?err.message:err)+'</div></div>';
  }

  // salva tutto l'archivio nel Foglio (con controllo di versione: se un altro
  // accesso ha modificato i dati nel frattempo, ricarico invece di sovrascrivere)
  function salvaTutto(){
    statoSync("salvataggio…");
    google.script.run.withSuccessHandler(function(res){
      if(res && res.conflitto){
        try{STATO=res.dati?JSON.parse(res.dati):STATO;}catch(e){}
        VERSIONE=res.versione;
        STATO.intestatari=STATO.intestatari||[]; STATO.utenze=STATO.utenze||[];
        STATO.bollette=STATO.bollette||[]; STATO.azioni=STATO.azioni||[];
        FORM=null; render(); statoSync("ricaricato");
        alert("I dati erano stati modificati da un altro accesso. Ho ricaricato la versione aggiornata: ricontrolla e rifai la tua modifica.");
        return;
      }
      VERSIONE=(res&&res.versione)||VERSIONE; statoSync("salvato ✓");
    }).withFailureHandler(function(e){statoSync("errore salvataggio");}).apiSalva(JSON.stringify(STATO), VERSIONE);
  }

  function renderNav(){
    var nav=document.getElementById("nav");
    nav.innerHTML=TABS.map(function(t){return '<button class="tab'+(t.id===TAB?' on':'')+'" data-tab="'+t.id+'">'+esc(t.label)+'</button>';}).join("");
    Array.prototype.forEach.call(nav.querySelectorAll(".tab"),function(btn){btn.onclick=function(){TAB=btn.getAttribute("data-tab");FORM=null;renderNav();render();};});
  }

  function render(){
    var m=document.getElementById("main");
    if(TAB==="utenze"){m.innerHTML=vistaUtenze();return;}
    if(TAB==="bollette"){m.innerHTML=vistaBollette();return;}
    if(TAB==="consumi"){m.innerHTML=vistaConsumi();return;}
    if(TAB==="azioni"){m.innerHTML=vistaAzioni();return;}
    m.innerHTML='<div class="avviso">Sezione in arrivo.</div>';
  }

  function vistaUtenze(){
    var html='<h2>Anagrafica utenze</h2><div class="grid">';
    STATO.intestatari.forEach(function(i){
      var us=STATO.utenze.filter(function(u){return u.intestatario===i.id;});
      var el=us.filter(function(u){return u.tipo==="elettrico";}).length;
      var ga=us.filter(function(u){return u.tipo==="gas";}).length;
      var ac=us.filter(function(u){return u.tipo==="acqua";}).length;
      var c=[]; if(el)c.push('<span class="el">'+el+' elettriche</span>'); if(ga)c.push('<span class="ga">'+ga+' gas</span>'); if(ac)c.push('<span class="ac">'+ac+' acqua</span>');
      html+='<div class="card"><div class="nome">'+esc(i.nome)+'</div><div class="cf">CF '+esc(i.cf||"—")+' · Cliente '+esc(i.codiceCliente||"—")+'</div><div class="conta">'+(c.join(" &nbsp; ")||'<span class="soft">nessuna utenza</span>')+'</div></div>';
    });
    html+='</div><h2>Elenco utenze</h2><table><thead><tr><th>Luogo</th><th>Tipo</th><th>POD / PDR</th><th>PDE</th><th>Potenza</th><th>Bollette</th></tr></thead><tbody>';
    STATO.utenze.forEach(function(u){
      var cls=u.tipo==="gas"?"ga":u.tipo==="acqua"?"ac":"el";
      html+='<tr><td><b>'+esc(u.luogo)+'</b><div class="soft">'+esc(u.indirizzo||"")+'</div></td><td><span class="pill '+cls+'">'+esc(tipoBreve(u.tipo))+'</span></td><td class="mono">'+esc(u.codice||"—")+'</td><td class="mono">'+esc(u.pde||"—")+'</td><td class="mono">'+(u.potenza!=null&&u.potenza!==""?esc(u.potenza)+" kW":"—")+'</td><td class="mono" style="text-align:center">'+nBollette(u.id)+'</td></tr>';
    });
    html+='</tbody></table><div class="soft" style="margin-top:10px">'+STATO.utenze.length+' utenze · '+STATO.bollette.length+' bollette</div>';
    return html;
  }

  // ---- BOLLETTE ----
  function vistaBollette(){
    var html='<h2>Bollette</h2>';
    html+='<div class="toolbar">'+
      '<label class="btn dk"><input type="file" accept="application/pdf" style="display:none" onchange="onFilePdf(this)"> Carica PDF (va su Drive)</label>'+
      '<button class="btn" onclick="apriForm()">+ Aggiungi a mano</button>'+
      '<span class="soft">'+STATO.bollette.length+' bollette in archivio</span></div>';
    if(FORM) html+=formBolletta();
    if(STATO.bollette.length===0 && !FORM){
      html+='<div class="avviso">Nessuna bolletta. Usa <b>Carica PDF</b> (il file finisce su Drive e poi compili i dati) oppure <b>Aggiungi a mano</b>.</div>';
      return html;
    }
    if(STATO.bollette.length){
      html+='<table><thead><tr><th>Utenza</th><th>Periodo</th><th>Consumo</th><th>Importo</th><th>Scadenza</th><th>Stato</th><th>PDF</th><th></th></tr></thead><tbody>';
      var tot=0;
      STATO.bollette.slice().sort(function(a,b){return (b.dataInizio||"").localeCompare(a.dataInizio||"");}).forEach(function(b){
        var tipo=utenzaTipo(b.utenza); tot+=parseFloat(b.importo)||0;
        var scad=isScaduta(b); var stato=b.pagata?"Pagata":(scad?"Scaduta":"Da pagare");
        var col=b.pagata?"#1f5e3a":(scad?"#8a2a16":"#6e4a10"); var bg=b.pagata?"#DCEBE5":(scad?"#F2DCD4":"#F4E3C4");
        html+='<tr><td><b>'+esc(utenzaLabel(b.utenza))+'</b>'+(b.numero?'<div class="soft">n. '+esc(b.numero)+'</div>':'')+(b.note?'<div style="color:var(--rosso);font-size:12px">⚠ '+esc(b.note)+'</div>':'')+'</td>'+
          '<td class="mono">'+esc(dataIT(b.dataInizio))+' → '+esc(dataIT(b.dataFine))+'</td>'+
          '<td class="mono">'+((b.consumo!==""&&b.consumo!=null)?(numIT(b.consumo)+" "+unitaDi(tipo)):"—")+'</td>'+
          '<td class="mono"><b>'+eur(b.importo)+'</b>'+(b.quotaFissa?'<div class="soft">di cui fissa '+eur(b.quotaFissa)+'</div>':'')+'</td>'+
          '<td class="mono">'+esc(dataIT(b.scadenza))+'</td>'+
          '<td><button class="iconbtn" title="clic per cambiare stato" onclick="togglePagata(\''+b.id+'\')" style="background:'+bg+';color:'+col+';border-radius:20px;padding:3px 10px;font-weight:600;font-size:12px;border:none">'+stato+'</button></td>'+
          '<td>'+(b.linkDrive?'<a class="link" target="_blank" href="'+esc(b.linkDrive)+'">apri</a>':'<span class="soft">—</span>')+'</td>'+
          '<td style="white-space:nowrap"><button class="iconbtn" onclick="apriForm(\''+b.id+'\')">modifica</button><button class="iconbtn del" onclick="eliminaBolletta(\''+b.id+'\')">elimina</button></td></tr>';
      });
      html+='</tbody></table><div class="soft" style="margin-top:10px">'+STATO.bollette.length+' bollette · totale '+eur(tot)+'</div>';
    }
    return html;
  }

  function formBolletta(){
    var f=FORM||{};
    var opts='<option value=""'+(f.utenza?'':' selected')+'>— da abbinare —</option>'+STATO.utenze.map(function(u){return '<option value="'+u.id+'"'+(f.utenza===u.id?' selected':'')+'>'+esc(u.luogo+" · "+tipoBreve(u.tipo)+" (PDE "+(u.pde||"—")+")")+'</option>';}).join("");
    return '<div class="form"><h2 style="font-size:17px">'+(f.id?'Modifica bolletta':'Nuova bolletta')+'</h2>'+
      (f.fileNome?'<div class="soft" style="margin-bottom:12px">PDF su Drive: <b>'+esc(f.fileNome)+'</b> ✓</div>':'')+
      '<div class="riga">'+
        '<div style="grid-column:1/-1"><label class="f">Utenza</label><select id="f_utenza" class="inp">'+opts+'</select></div>'+
      '</div>'+
      '<div class="riga">'+
        '<div><label class="f">Periodo dal</label><input id="f_dal" type="date" class="inp" value="'+esc(f.dataInizio||"")+'"></div>'+
        '<div><label class="f">Periodo al</label><input id="f_al" type="date" class="inp" value="'+esc(f.dataFine||"")+'"></div>'+
        '<div><label class="f">Scadenza</label><input id="f_scad" type="date" class="inp" value="'+esc(f.scadenza||"")+'"></div>'+
      '</div>'+
      '<div class="riga">'+
        '<div><label class="f">Consumo</label><input id="f_consumo" type="number" step="any" class="inp" value="'+esc(f.consumo||"")+'"></div>'+
        '<div><label class="f">Importo (€)</label><input id="f_importo" type="number" step="any" class="inp" value="'+esc(f.importo||"")+'"></div>'+
      '</div>'+
      '<div class="riga">'+
        '<div><label class="f">N° fattura</label><input id="f_numero" type="text" class="inp" value="'+esc(f.numero||"")+'"></div>'+
        '<div><label class="f">di cui quota fissa (€)</label><input id="f_qf" type="number" step="any" class="inp" value="'+esc(f.quotaFissa||"")+'"></div>'+
      '</div>'+
      '<div class="riga"><div style="grid-column:1/-1"><label class="f">Link al PDF su Drive</label><input id="f_link" type="text" class="inp" value="'+esc(f.linkDrive||"")+'" placeholder="si compila da solo se carichi il PDF"></div></div>'+
      '<div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn" onclick="annullaForm()">Annulla</button><button class="btn pri" onclick="salvaBolletta()">Salva bolletta</button></div></div>';
  }

  function apriForm(id){
    if(id){ FORM=JSON.parse(JSON.stringify(STATO.bollette.filter(function(b){return b.id===id;})[0]||{})); }
    else { FORM={utenza:"", pagata:false}; }
    render();
  }
  function annullaForm(){ FORM=null; render(); }

  function normEnergia(s){return String(s||"").replace(/\s/g,"").toUpperCase().replace(/^IT0{0,2}1E/,"IT001E");}
  // numero -> "" se il valore è nullo (i numeri 0 vanno tenuti)
  function val(v){return (v===null||v===undefined)?"":v;}

  function campoToRec(c,res){
    c=c||{};
    return {utenza:c.utenzaId||"", numero:c.numero||"", fornitore:c.fornitore||"",
      dataInizio:c.dataInizio||"", dataFine:c.dataFine||"", consumo:val(c.consumo),
      importo:val(c.importo), quotaFissa:val(c.quotaFissa), scadenza:c.scadenza||"",
      prezzoUnitario:val(c.prezzoUnitario), consumoAnnuo:val(c.consumoAnnuo), spesaAnnua:val(c.spesaAnnua),
      avvisoInsoluti:!!c.avvisoInsoluti, pagata:false, linkDrive:res.url||"", fileNome:res.nome||""};
  }

  // --- database incrementale: crea l'anagrafica dalla bolletta se manca ---
  function trovaOCreaIntestatario(c){
    var cod=c.codiceCliente||"";
    var ex=STATO.intestatari.filter(function(x){return cod&&x.codiceCliente===cod;})[0];
    if(ex) return ex.id;
    if(c.intestatario){ var byNome=STATO.intestatari.filter(function(x){return (x.nome||"").toUpperCase()===c.intestatario.toUpperCase();})[0]; if(byNome) return byNome.id; }
    var id="int-"+(cod||uid());
    STATO.intestatari.push({id:id,nome:c.intestatario||("Cliente "+cod),cf:c.cf||"",codiceCliente:cod,fornitore:"Energentium"});
    CREATI.intestatari++; return id;
  }
  function agganciaUtenza(c){
    if(!c.codice) return ""; // senza POD/PDR non creo (resta "da abbinare")
    var n=normEnergia(c.codice);
    var ex=STATO.utenze.filter(function(x){return normEnergia(x.codice)===n;})[0];
    if(ex){
      if((ex.potenza==null||ex.potenza==="")&&c.potenza!=null) ex.potenza=c.potenza;
      if(!ex.indirizzo&&c.indirizzoFornitura) ex.indirizzo=c.indirizzoFornitura;
      if(!ex.pde&&c.pde) ex.pde=c.pde;
      return ex.id; // utenza già nota: uso la sua parrocchia, non ne creo
    }
    var intId=trovaOCreaIntestatario(c); // parrocchia solo per utenza nuova
    var id="u-"+(c.pde||uid());
    if(STATO.utenze.some(function(x){return x.id===id;})) id="u-"+uid();
    var luogo=c.indirizzoFornitura?(c.indirizzoFornitura+(c.pde?" (PDE "+c.pde+")":"")):("PDE "+(c.pde||"?"));
    STATO.utenze.push({id:id,intestatario:intId,tipo:c.tipo||"elettrico",luogo:luogo,
      indirizzo:c.indirizzoFornitura||"",codice:c.codice,pde:c.pde||"",potenza:(c.potenza!=null?c.potenza:null),note:""});
    CREATI.utenze++; return id;
  }

  // Assorbe il risultato del PDF: aggiunge le bollette e crea l'anagrafica mancante.
  var CREATI;
  function assorbiPdf(res){
    var righe=(res&&res.righe)||[];
    CREATI={intestatari:0,utenze:0};
    var add=0,dup=0,nonric=0,incompleta=0;
    if(!righe.length){
      var rec0=campoToRec({},res); rec0.id=uid(); rec0.note="PDF caricato, dati da inserire a mano"; STATO.bollette.push(rec0); add++;
    }
    righe.forEach(function(c){
      var rec=campoToRec(c,res);
      if(c.fornitore!=="energentium"){
        rec.id=uid(); rec.utenza=""; rec.note="fornitore non riconosciuto — compila a mano"; STATO.bollette.push(rec); nonric++; return;
      }
      if(c.codice){ rec.utenza=agganciaUtenza(c); }
      if(esisteBolletta(rec)){ dup++; return; }
      if(rec.importo===""){ rec.note="dati incompleti — verifica"; incompleta++; }
      rec.id=uid(); STATO.bollette.push(rec); add++;
    });
    salvaTutto(); FORM=null; render();
    var msg="Lette dal PDF: "+add+" bollette aggiunte";
    if(dup) msg+=" · "+dup+" doppioni saltati";
    if(CREATI.utenze) msg+=" · "+CREATI.utenze+" nuove utenze";
    if(CREATI.intestatari) msg+=" · "+CREATI.intestatari+" nuove parrocchie";
    if(nonric) msg+=" · "+nonric+" da fornitore non riconosciuto";
    if(incompleta) msg+=" · "+incompleta+" con dati incompleti";
    statoSync("PDF assorbito ✓");
    alert(msg+". Controlla nella tabella e correggi se serve.");
  }
  function esisteBolletta(rec){
    return STATO.bollette.some(function(b){
      if(rec.numero && b.numero) return String(b.numero).trim()===String(rec.numero).trim();
      return rec.dataInizio && b.utenza===rec.utenza && b.dataInizio===rec.dataInizio;
    });
  }
  function onFilePdf(input){
    var f=input.files[0]; if(!f) return;
    statoSync("carico e leggo il PDF…");
    var r=new FileReader();
    r.onload=function(){
      google.script.run.withSuccessHandler(assorbiPdf)
        .withFailureHandler(function(e){ statoSync("errore PDF"); alert("Errore nel caricare il PDF: "+(e&&e.message?e.message:e)); })
        .apiCaricaPdf(r.result, f.name);
    };
    r.readAsDataURL(f);
    input.value="";
  }

  function salvaBolletta(){
    var g=function(id){return document.getElementById(id);};
    var nuovo=!FORM.id;
    var rec = FORM.id ? STATO.bollette.filter(function(b){return b.id===FORM.id;})[0] : {id:uid(), pagata:false};
    rec.utenza=g("f_utenza").value;
    rec.dataInizio=g("f_dal").value;
    rec.dataFine=g("f_al").value;
    rec.scadenza=g("f_scad").value;
    rec.consumo=g("f_consumo").value;
    rec.importo=g("f_importo").value;
    rec.linkDrive=g("f_link").value;
    rec.numero=g("f_numero").value;
    rec.quotaFissa=g("f_qf").value;
    if(FORM.fileNome) rec.fileNome=FORM.fileNome;
    if(nuovo){
      if(esisteBolletta(rec) && !confirm("Sembra già presente una bolletta uguale (stesso numero, o stessa utenza e periodo). Aggiungere lo stesso?")) return;
      STATO.bollette.push(rec);
    }
    FORM=null;
    salvaTutto();
    render();
  }

  function eliminaBolletta(id){
    if(!confirm("Eliminare questa bolletta dall'archivio?")) return;
    STATO.bollette=STATO.bollette.filter(function(b){return b.id!==id;});
    salvaTutto();
    render();
  }

  // ---- ANALISI CONSUMI ----
  function tipoNome(t){return t==="gas"?"Gas":t==="acqua"?"Acqua":"Luce";}
  function coloreTipo(t){return t==="gas"?"var(--gas)":t==="acqua"?"var(--verde)":"var(--ambra)";}
  function nomeParrocchia(uid){var u=STATO.utenze.filter(function(x){return x.id===uid;})[0]; if(!u)return "—"; var i=STATO.intestatari.filter(function(x){return x.id===u.intestatario;})[0]; return i?i.nome:"—";}
  function ultimaPerUtenza(){var m={};STATO.bollette.forEach(function(b){if(!b.utenza)return;var c=m[b.utenza];if(!c||(b.dataInizio||"")>(c.dataInizio||""))m[b.utenza]=b;});return m;}
  function kpi(v,l){return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div></div>';}
  function barreFrom(pairs,fmt,col){
    var max=pairs.reduce(function(a,p){return Math.max(a,p[1]||0);},0)||1;
    return pairs.map(function(p){var w=Math.round((p[1]||0)/max*100);var c=typeof col==="function"?col(p):col;
      return '<div class="barrow"><div class="barlab">'+esc(p[0])+'</div><div class="bartrack"><div class="bar" style="width:'+w+'%;background:'+c+'"></div></div><div class="barval">'+fmt(p[1])+'</div></div>';}).join("");
  }
  function setCons(v){CONSVISTA=v;render();}

  function vistaConsumi(){
    if(!STATO.bollette.length) return '<h2>Analisi consumi</h2><div class="avviso">Nessuna bolletta in archivio: carica i PDF dalla scheda <b>Bollette</b> per vedere le analisi.</div>';
    var subs=[["spesa","Spesa & andamento"],["sprechi","Sprechi €/unità & quota fissa"],["confronto","Confronto"],["anomalie","Anomalie & da chiudere"]];
    var html='<h2>Analisi consumi</h2><div class="subnav">'+subs.map(function(s){return '<button class="subtab'+(CONSVISTA===s[0]?' on':'')+'" onclick="setCons(\''+s[0]+'\')">'+esc(s[1])+'</button>';}).join("")+'</div>';
    return html+(CONSVISTA==="sprechi"?consSprechi():CONSVISTA==="confronto"?consConfronto():CONSVISTA==="anomalie"?consAnomalie():consSpesa());
  }

  function consSpesa(){
    var um=ultimaPerUtenza();
    var spesaTot=0; STATO.bollette.forEach(function(b){spesaTot+=parseFloat(b.importo)||0;});
    var annua=0; Object.keys(um).forEach(function(k){annua+=parseFloat(um[k].spesaAnnua)||0;});
    var html='<div class="kpis">'+kpi(eur(spesaTot),"Spesa registrata")+kpi(annua?eur(annua):"—","Spesa annua stimata")+kpi(STATO.bollette.length,"Bollette")+kpi(STATO.utenze.length,"Utenze")+kpi(STATO.intestatari.length,"Parrocchie")+'</div>';
    var perTipo={}; STATO.bollette.forEach(function(b){var t=utenzaTipo(b.utenza)||"elettrico";perTipo[t]=(perTipo[t]||0)+(parseFloat(b.importo)||0);});
    var pTipo=Object.keys(perTipo).map(function(t){return [tipoNome(t),perTipo[t],t];}).sort(function(a,b){return b[1]-a[1];});
    html+='<div class="blocco"><h3>Spesa per tipo</h3>'+(pTipo.length?barreFrom(pTipo,eur,function(p){return coloreTipo(p[2]);}):'<div class="soft">—</div>')+'</div>';
    var perMese={}; STATO.bollette.forEach(function(b){var k=(b.dataInizio||"").slice(0,7);if(!k)return;perMese[k]=(perMese[k]||0)+(parseFloat(b.importo)||0);});
    var mesi=Object.keys(perMese).sort().map(function(k){var p=k.split("-");return [p[1]+"/"+p[0],perMese[k]];});
    html+='<div class="blocco"><h3>Andamento mensile (spesa)</h3>'+(mesi.length?barreFrom(mesi,eur,"var(--verdeDk)"):'<div class="soft">—</div>')+'</div>';
    return html;
  }

  function consSprechi(){
    var um=ultimaPerUtenza(), righe=[];
    STATO.utenze.forEach(function(u){var b=um[u.id];if(!b)return;var imp=parseFloat(b.importo)||0,qf=parseFloat(b.quotaFissa);righe.push({u:u,imp:imp,qf:qf,pct:(imp>0&&!isNaN(qf))?Math.round(qf/imp*100):null,pu:parseFloat(b.prezzoUnitario)});});
    righe.sort(function(a,b){return (b.pct||0)-(a.pct||0);});
    if(!righe.length) return '<div class="blocco"><div class="soft">Nessun dato: servono bollette abbinate a un\'utenza.</div></div>';
    var html='<div class="blocco"><h3>Costo unitario e peso della quota fissa</h3><div class="soft" style="margin-bottom:10px">Ordinate dalla quota fissa più pesante. Oltre il 60% = il contatore costa soprattutto per il fatto di esistere.</div><table><thead><tr><th>Utenza</th><th>Tipo</th><th>€/unità</th><th>Quota fissa</th><th>% fissa</th><th>Importo</th></tr></thead><tbody>';
    righe.forEach(function(r){var al=r.pct!=null&&r.pct>60;
      html+='<tr><td><b>'+esc(r.u.luogo)+'</b></td><td>'+tipoNome(r.u.tipo)+'</td><td class="mono">'+(isNaN(r.pu)?"—":numIT(r.pu)+" €/"+unitaDi(r.u.tipo))+'</td><td class="mono">'+(isNaN(r.qf)?"—":eur(r.qf))+'</td><td class="mono"'+(al?' style="color:var(--rosso);font-weight:700"':'')+'>'+(r.pct==null?"—":r.pct+"%")+'</td><td class="mono">'+eur(r.imp)+'</td></tr>';});
    return html+'</tbody></table></div>';
  }

  function consConfronto(){
    var um=ultimaPerUtenza(), pu=[], pp={};
    STATO.utenze.forEach(function(u){var b=um[u.id];var sa=b?parseFloat(b.spesaAnnua):NaN;if(!isNaN(sa)&&sa>0){pu.push([u.luogo,sa,u.tipo]);var p=nomeParrocchia(u.id);pp[p]=(pp[p]||0)+sa;}});
    pu.sort(function(a,b){return b[1]-a[1];});
    var ppp=Object.keys(pp).map(function(k){return [k,pp[k]];}).sort(function(a,b){return b[1]-a[1];});
    var html='<div class="blocco"><h3>Spesa annua per utenza</h3>'+(pu.length?barreFrom(pu,eur,function(p){return coloreTipo(p[2]);}):'<div class="soft">Manca la spesa annua: ricarica i PDF con il motore aggiornato.</div>')+'</div>';
    html+='<div class="blocco"><h3>Spesa annua per parrocchia</h3>'+(ppp.length?barreFrom(ppp,eur,"var(--verdeDk)"):'<div class="soft">—</div>')+'</div>';
    return html;
  }

  function consAnomalie(){
    var um=ultimaPerUtenza(), items=[];
    STATO.utenze.forEach(function(u){var b=um[u.id];if(!b)return;var ca=parseFloat(b.consumoAnnuo),qf=parseFloat(b.quotaFissa),imp=parseFloat(b.importo)||0;
      if(!isNaN(ca)&&ca===0&&!isNaN(qf)&&qf>0) items.push(["⚪","Consumo annuo zero — "+esc(u.luogo),"paghi "+eur(qf)+" di sola quota fissa"]);
      else if(imp>0&&!isNaN(qf)&&qf/imp>0.6) items.push(["🟠","Quota fissa oltre il 60% — "+esc(u.luogo),"su "+eur(imp)+", "+eur(qf)+" è fisso"]);
      if(u.potenza&&!isNaN(ca)&&ca<100&&u.potenza>=6) items.push(["🔌","Potenza forse sovradimensionata — "+esc(u.luogo),u.potenza+" kW per "+(isNaN(ca)?"?":ca)+" kWh/anno"]);});
    STATO.utenze.forEach(function(u){ if(nBollette(u.id)===0) items.push(["◻️","Nessuna bolletta — "+esc(u.luogo),"utenza in anagrafica ma senza dati"]); });
    STATO.bollette.forEach(function(b){ if(b.note) items.push(["⚠️","Bolletta da sistemare — "+esc(utenzaLabel(b.utenza)),esc(b.note)]); });
    return '<div class="blocco"><h3>Anomalie e contatori da valutare ('+items.length+')</h3>'+(items.length?items.map(function(it){return '<div class="azione"><div class="ico">'+it[0]+'</div><div class="txt">'+it[1]+'<div class="meta">'+it[2]+'</div></div></div>';}).join(""):'<div class="soft">Nessuna anomalia rilevata 👍</div>')+'</div>';
  }

  // ---- AZIONI APERTE ----
  function azioneAuto(ico,txt,meta,tag,cls){return '<div class="azione"><div class="ico">'+ico+'</div><div class="txt">'+txt+(tag?'<span class="tag '+cls+'">'+tag+'</span>':'')+(meta?'<div class="meta">'+meta+'</div>':'')+'</div></div>';}
  function vistaAzioni(){
    var html='<h2>Azioni aperte</h2>', auto=[], um=ultimaPerUtenza();
    STATO.bollette.forEach(function(b){ if(b.pagata||!b.scadenza) return; var et=esc(utenzaLabel(b.utenza));
      if(isScaduta(b)) auto.push(azioneAuto("🔴","Bolletta "+et+" <b>scaduta</b> il "+esc(dataIT(b.scadenza)),eur(b.importo),"scaduta","r"));
      else auto.push(azioneAuto("🟠","Bolletta "+et+" da pagare entro "+esc(dataIT(b.scadenza)),eur(b.importo),"da pagare","a")); });
    STATO.utenze.forEach(function(u){var b=um[u.id];if(!b)return;var ca=parseFloat(b.consumoAnnuo),qf=parseFloat(b.quotaFissa);
      if(!isNaN(ca)&&ca===0&&!isNaN(qf)&&qf>0) auto.push(azioneAuto("⚪","Contatore "+esc(u.luogo)+" a <b>consumo zero</b> con quota fissa","da valutare la chiusura","da valutare","a")); });
    STATO.utenze.forEach(function(u){ if(nBollette(u.id)===0) auto.push(azioneAuto("◻️","Utenza "+esc(u.luogo)+" senza bollette","","manca dati","a")); });
    var insol={}; STATO.bollette.forEach(function(b){ if(b.avvisoInsoluti&&b.utenza) insol[nomeParrocchia(b.utenza)]=true; });
    Object.keys(insol).forEach(function(p){ auto.push(azioneAuto("⚠️",esc(p)+": la bolletta segnala <b>insoluti pregressi</b>","verifica i pagamenti","insoluti","r")); });
    html+='<div class="blocco"><h3>Avvisi automatici ('+auto.length+')</h3>'+(auto.length?auto.join(""):'<div class="soft">Nessun avviso. Tutto in regola 👍</div>')+'</div>';
    html+='<div class="blocco"><h3>Le tue azioni</h3><div style="display:flex;gap:8px;margin-bottom:14px"><input id="az_input" class="inp" placeholder="Aggiungi un\'azione…" style="flex:1" onkeydown="if(event.key===\'Enter\')aggiungiAzione()"><button class="btn pri" onclick="aggiungiAzione()">Aggiungi</button></div>'+
      (STATO.azioni.length?STATO.azioni.map(function(a){return '<div class="azione"><div class="ico" style="cursor:pointer" onclick="toggleAzione(\''+a.id+'\')">'+(a.fatta?'✅':'⬜')+'</div><div class="txt'+(a.fatta?' fatta':'')+'">'+esc(a.testo)+'</div><button class="iconbtn del" onclick="eliminaAzione(\''+a.id+'\')">elimina</button></div>';}).join(""):'<div class="soft">Nessuna azione manuale. Aggiungile qui sopra.</div>')+'</div>';
    return html;
  }
  function aggiungiAzione(){var el=document.getElementById("az_input");var t=(el&&el.value||"").trim();if(!t)return;STATO.azioni.push({id:uid(),testo:t,fatta:false});salvaTutto();render();}
  function toggleAzione(id){var a=STATO.azioni.filter(function(x){return x.id===id;})[0];if(a){a.fatta=!a.fatta;salvaTutto();render();}}
  function eliminaAzione(id){STATO.azioni=STATO.azioni.filter(function(x){return x.id!==id;});salvaTutto();render();}

  avvia();
</script>
</body>
