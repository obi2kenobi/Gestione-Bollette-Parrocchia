============================================================ */
const KEY = "utenze-energia-v1";
// File unico per entrambi gli ambienti.
// Dentro Claude esiste window.storage; sul Mac si usa il localStorage del browser.
const isClaude = typeof window !== "undefined" && !!window.storage;
async function loadState() {
  try {
    if (isClaude) {
      const r = await window.storage.get(KEY);
      if (r && r.value) return JSON.parse(r.value);
    } else {
      const raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    }
  } catch (e) {/* prima esecuzione */}
  return null;
}
async function saveState(state) {
  try {
    if (isClaude) await window.storage.set(KEY, JSON.stringify(state));else localStorage.setItem(KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Salvataggio non riuscito", e);
  }
}

/* ============================================================
   COLLEGAMENTO GOOGLE FOGLI (archivio condiviso, opzionale)
   La configurazione (indirizzo + parola segreta) vive SOLO in questo
   browser: non entra nel backup .json né viene inviata nel cloud.
============================================================ */
const CFG_KEY = "utenze-cloud-cfg";
function loadCfg() {
  try {
    const raw = localStorage.getItem(CFG_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {/* non configurato */}
  return null;
}
function saveCfg(cfg) {
  try {
    if (cfg && cfg.url) localStorage.setItem(CFG_KEY, JSON.stringify(cfg));else localStorage.removeItem(CFG_KEY);
  } catch (e) {/* spazio esaurito */}
}
// Le richieste usano Content-Type "text/plain" di proposito: così il browser
// non invia il controllo CORS preliminare, che Apps Script non gestisce.
async function cloudChiama(cfg, corpo) {
  const resp = await fetch(cfg.url, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      parola: cfg.parola,
      ...corpo
    })
  });
  const data = await resp.json();
  if (!data.ok) throw new Error(data.errore === "parola-errata" ? "Parola segreta errata." : data.errore || "Errore dall'archivio.");
  return data;
}
async function cloudCarica(cfg) {
  const data = await cloudChiama(cfg, {
    azione: "carica"
  });
  return data.contenuto ? JSON.parse(data.contenuto) : null;
}
async function cloudSalva(cfg, stato) {
  await cloudChiama(cfg, {
    azione: "salva",
    contenuto: JSON.stringify(stato)
  });
}

  if (!url) return null;
  const s = String(url);
  const m = s.match(/\/d\/([a-zA-Z0-9_-]{20,})/) || s.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
  return m ? m[1] : null;
};
// URL di anteprima incorporabile in un riquadro (iframe): solo per i link diretti al file.
const drivePreviewUrl = url => {
  const id = driveFileId(url);
  return id ? `https://drive.google.com/file/d/${id}/preview` : null;
};
// true se il link è una semplice ricerca per nome su Drive (non apre il file esatto).
const isLinkRicerca = url => /drive\.google\.com\/drive\/search/i.test(String(url || ""));

// Normalizza un codice POD/PDR per il confronto: niente spazi, maiuscolo,
// e i POD in forma abbreviata (IT1E…, IT01E…) portati alla forma piena IT001E….
const normEnergia = s => String(s || "").replace(/\s/g, "").toUpperCase().replace(/^IT0{0,2}1E/, "IT001E");

// Unità di misura ed etichetta breve per tipo di utenza (elettrico / gas / acqua)
const unitaDi = tipo => tipo === "gas" ? "Smc" : tipo === "acqua" ? "mc" : "kWh";
const tipoBreve = tipo => tipo === "gas" ? "Gas" : tipo === "acqua" ? "Acqua" : "El.";

/* ============================================================
   MOTORE DI ESTRAZIONE BOLLETTE (ibrido a 3 stadi)
   Stadio 1: pdf.js estrae il testo in locale (0 token)
   Stadio 2: parser su pattern Energentium + validazione
   Stadio 3 (a richiesta): Claude legge il PDF se il parser fallisce
============================================================ */

// Carica pdf.js da CDN una sola volta
let pdfjsPromise = null;
function loadPdfJs() {
  if (pdfjsPromise) return pdfjsPromise;
  pdfjsPromise = new Promise((resolve, reject) => {
    if (window.pdfjsLib) {
      resolve(window.pdfjsLib);
      return;
    }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    s.onerror = () => reject(new Error("Impossibile caricare il lettore PDF"));
    document.head.appendChild(s);
  });
  return pdfjsPromise;
}

// Estrae il testo grezzo da un File PDF (in locale, niente AI)
async function estraiTestoPdf(file) {
  const pdfjs = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjs.getDocument({
    data: buf
  }).promise;
  let testo = "";
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const content = await page.getTextContent();
    testo += content.items.map(i => i.str).join(" ") + "\n";
  }
  return testo;
}

// Divide un PDF che contiene più bollette (es. 7 utenze elettriche in un file)
// in blocchi separati, uno per ogni "Intestatario:". Se ce n'è una sola, restituisce [testo].
function splitBollette(testo) {
  const idx = [...testo.matchAll(/Intestatario:/g)].map(m => m.index);
  if (idx.length <= 1) return [testo];
  const blocchi = [];
  for (let i = 0; i < idx.length; i++) {
    blocchi.push(testo.slice(idx[i], i + 1 < idx.length ? idx[i + 1] : undefined));
  }
  return blocchi;
}

// Normalizza un numero italiano "1.234,56" -> 1234.56
function parseNumIt(s) {
  if (!s) return null;
  const clean = String(s).replace(/[^\d.,-]/g, "").replace(/\./g, "").replace(",", ".");
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

// Converte date varie -> ISO yyyy-mm-dd
function toISO(s) {
  if (!s) return "";
  const m = s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if (!m) return "";
  let [, d, mo, y] = m;
  if (y.length === 2) y = "20" + y;
  return `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
}
const MESI_ABBR = {
  gen: 1,
  feb: 2,
  mar: 3,
  apr: 4,
  mag: 5,
  giu: 6,
  lug: 7,
  ago: 8,
  set: 9,
  ott: 10,
  nov: 11,
  dic: 12
};
const vuoto = () => ({
  valore: "",
  conf: "vuoto"
});
const ultimoGiorno = (anno, mese) => new Date(anno, mese, 0).getDate();

// Riconosce il fornitore dalle parole-chiave nel testo
function riconosciFornitore(testo) {
  const t = testo.toLowerCase();
  if (t.includes("energentium")) return "energentium";
  if (t.includes("acque spa") || t.includes("acque.net")) return "acque";
  if (t.includes("enel energia") || t.includes("enel.it")) return "enel";
  return "sconosciuto";
}

/* PARSER ENERGENTIUM.
   Nel testo lineare i tre valori importo/scadenza/consumo finiscono separati
   dalle etichette: li recupero da pattern ancorati nello scontrino. */
function parseEnergentium(testo) {
  const tFlat = testo.replace(/\s+/g, " ");
  const out = {};
  const podLab = tFlat.match(/Codice POD[:\s]+(IT\s?0{0,2}1E\s?\d{8,9})/i);
  const pdrLab = tFlat.match(/Codice PDR[:\s]+(\d{14,15})/i);
  const pod = tFlat.match(/IT\s?0{0,2}1E\s?\d{8,9}/i);
  const pdrAny = tFlat.match(/\b\d{14,15}\b/);
  out.codice = podLab ? {
    valore: podLab[1].replace(/\s/g, ""),
    conf: "ok"
  } : pdrLab ? {
    valore: pdrLab[1],
    conf: "ok"
  } : pod ? {
    valore: pod[0].replace(/\s/g, ""),
    conf: "ok"
  } : pdrAny ? {
    valore: pdrAny[0],
    conf: "incerto"
  } : vuoto();

  // tipo: il modo affidabile è guardare il codice estratto (un POD inizia con IT...E,
  // un PDR è di 14-15 cifre). Il testo standard dei reclami cita "energia elettrica"
  // anche nelle bollette gas, quindi NON va usato come indizio.
  const cod = out.codice?.valore || "";
  out._tipo = /^IT/i.test(cod) ? "elettrico" : /^\d{14,15}$/.test(cod) ? "gas" : /GAS\s+NATURALE/i.test(tFlat) ? "gas" : /\d\s*kWh\s*x/i.test(tFlat) ? "elettrico" : "gas";

  // Riquadro di sintesi in prima pagina. Esistono due ordini di impaginazione del
  // testo estratto, entrambi reali e qui supportati:
  //  (A) "...CONSUMO 312,12 11 194 Euro Maggio 2026"   → importo, giorno, consumo, Euro, mese, anno
  //  (B) "...CONSUMO 65,33 Euro 08 Luglio 2026 157 kWh" → importo, Euro, giorno, mese, anno, consumo
  // Le normalizzo in un'unica struttura `box` con i campi { importo, giorno, mese, anno, consumo }.
  const _mesiBox = "Gennaio|Febbraio|Marzo|Aprile|Maggio|Giugno|Luglio|Agosto|Settembre|Ottobre|Novembre|Dicembre";
  const boxA = tFlat.match(/IMPORTO DA PAGARE\s+SCADENZA\s+CONSUMO\s+([\d.]+,\d{2})\s+(\d{1,2})\s+([\d.]+)\s+Euro/i);
  const boxB = tFlat.match(new RegExp(`IMPORTO DA PAGARE\\s+SCADENZA\\s+CONSUMO\\s+([\\d.]+,\\d{2})\\s+Euro\\s+(\\d{1,2})\\s+(${_mesiBox})\\s+(20\\d{2})\\s+([\\d.]+)`, "i"));
  const box = boxA ? {
    importo: boxA[1],
    giorno: boxA[2],
    consumo: boxA[3],
    mese: null,
    anno: null
  } : boxB ? {
    importo: boxB[1],
    giorno: boxB[2],
    mese: boxB[3],
    anno: boxB[4],
    consumo: boxB[5]
  } : null;
  // Compatibilità: codice esistente più sotto usa ancora `boxSintesi` con indici [1]=importo,[2]=giorno,[3]=consumo.
  const boxSintesi = box ? [box.importo + " " + box.giorno + " " + box.consumo, box.importo, box.giorno, box.consumo] : null;
  const per = tFlat.match(/Periodo oggetto di fatturazione[:\s]+(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})/i);
  if (per) {
    out.dataInizio = {
      valore: toISO(per[1]),
      conf: "ok"
    };
    out.dataFine = {
      valore: toISO(per[2]),
      conf: "ok"
    };
  } else {
    out.dataInizio = vuoto();
    out.dataFine = vuoto();
  }

  // Consumo: prima il riquadro di sintesi, poi la griglia "OFFERTA IMP GG CONS",
  // poi lo scontrino ("190 kWh x" / "194 Smc x"), poi il totale fatturato.
  const grigliaCons = tFlat.match(/PRAEMIUM\s+([\d.]+,\d{2})\s+(\d{1,2})\s+(\d+)\s/i);
  let cons = boxSintesi ? boxSintesi[3] : grigliaCons ? grigliaCons[3] : (tFlat.match(/([\d.]+)\s*kWh\s*x/i) || [])[1] || (tFlat.match(/([\d.]+)\s*Smc\s*x/i) || [])[1] || (tFlat.match(/TOTALE CONSUMO FATTURATO Smc\s+([\d.]+)/i) || [])[1] || (tFlat.match(/Quota per consumi\s+([\d.]+)\s*kWh/i) || [])[1];
  out.consumo = cons != null ? {
    valore: String(parseNumIt(cons)),
    conf: "ok"
  } : vuoto();
  let imp = tFlat.match(/TOTALE DA PAGARE\s*=?\s*([\d.]+,\d{2})/i) || boxSintesi && [boxSintesi[0], boxSintesi[1]] || tFlat.match(/IMPORTO DA PAGARE\s+SCADENZA\s+CONSUMO[\s\S]{0,80}?([\d.]+,\d{2})/i);
  out.importo = imp ? {
    valore: String(parseNumIt(imp[1])),
    conf: "ok"
  } : vuoto();

  // VERIFICA INCROCIATA (doppia lettura): l'importo nel riquadro di prima pagina
  // e il "TOTALE DA PAGARE" dello scontrino devono coincidere; idem il consumo
  // tra riquadro e dettaglio ("190 kWh x" / "194 Smc x"). Se divergono, la lettura
  // è marcata incerta e l'avviso obbliga a un controllo manuale.
  const totDettaglio = tFlat.match(/TOTALE DA PAGARE\s*=?\s*([\d.]+,\d{2})/i);
  if (boxSintesi && totDettaglio && Math.abs(parseNumIt(boxSintesi[1]) - parseNumIt(totDettaglio[1])) > 0.005) {
    out.importo.conf = "incerto";
    out._avvisoExtra = `Importo discordante tra prima pagina (${boxSintesi[1]} €) e totale di dettaglio (${totDettaglio[1]} €): verifica sul PDF.`;
  }
  const consDettaglio = (tFlat.match(/([\d.]+)\s*kWh\s*x/i) || tFlat.match(/([\d.]+)\s*Smc\s*x/i) || [])[1];
  if (boxSintesi && consDettaglio != null && parseNumIt(consDettaglio) !== parseNumIt(boxSintesi[3])) {
    out.consumo.conf = "incerto";
    out._avvisoExtra = (out._avvisoExtra ? out._avvisoExtra + " " : "") + `Consumo discordante tra prima pagina (${boxSintesi[3]}) e dettaglio (${consDettaglio}): verifica sul PDF.`;
  }

  // Scadenza: se il box è in formato (B) ho già giorno+mese+anno lì (fonte più affidabile).
  // Altrimenti giorno dal box/griglia e mese+anno dal testo ("...Maggio...2026").
  const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];
  if (box && box.mese && box.anno) {
    const mIdx = mesiNomi.indexOf(box.mese.toLowerCase()) + 1;
    out.scadenza = {
      valore: `${box.anno}-${String(mIdx).padStart(2, "0")}-${String(box.giorno).padStart(2, "0")}`,
      conf: "ok"
    };
  } else {
    const meseAnno = tFlat.match(new RegExp(`(${_mesiBox}).{0,30}?(20\\d{2})`, "i"));
    const giornoScad = boxSintesi ? boxSintesi[2] : grigliaCons ? grigliaCons[2] : (tFlat.match(/([\d.]+,\d{2})\s+(\d{1,2})\s+\d/) || [])[2];
    if (meseAnno && giornoScad) {
      const mIdx = mesiNomi.indexOf(meseAnno[1].toLowerCase()) + 1;
      out.scadenza = {
        valore: `${meseAnno[2]}-${String(mIdx).padStart(2, "0")}-${String(giornoScad).padStart(2, "0")}`,
        conf: "incerto"
      };
    } else out.scadenza = vuoto();
  }
  const nf = tFlat.match(/nr\.\s*([\d\-]+)\s+del/i);
  out.numero = nf ? {
    valore: nf[1],
    conf: "ok"
  } : vuoto();
  const qf = tFlat.match(/Quota fissa(?:\s+e\s+Quota potenza)?\s+\d+\s*mes[ei]?\s*x?\s*[\d.,]+\s*€?\/?mese\s*\+?\s*([\d.]+,\d{2})/i);
  out.quotaFissa = qf ? {
    valore: String(parseNumIt(qf[1])),
    conf: "incerto"
  } : vuoto();

  // Partite in accredito (es. "Restituzione Crediti -21,95", conguagli a credito): abbassano
  // il totale e possono renderlo inferiore alla sola quota fissa. Va segnalato alla validazione
  // perché non scambi questo caso reale per un errore di lettura.
  out._haAccredito = /Restituzione Crediti\s*-/i.test(tFlat) || /Conguaglio[^+]{0,20}-\s*[\d.]+,\d{2}/i.test(tFlat);
  return out;
}

/* PARSER ENEL.
   Periodo a parole ("SET. 2025 - OTT. 2025"), PDR nello scontrino,
   importo separato dalla valuta, presenza deposito cauzionale. */
function parseEnel(testo) {
  const tFlat = testo.replace(/\s+/g, " ");
  const out = {};
  const pdr = tFlat.match(/PDR[:\s]+(\d{14,15})/i) || tFlat.match(/\b\d{14,15}\b/);
  out.codice = pdr ? {
    valore: pdr[1] || pdr[0],
    conf: pdr[1] ? "ok" : "incerto"
  } : vuoto();
  const per = tFlat.match(/Periodo\s+([A-Z]{3})\.?\s*(\d{4})\s*-\s*([A-Z]{3})\.?\s*(\d{4})/i);
  if (per) {
    const m1 = MESI_ABBR[per[1].toLowerCase()],
      m2 = MESI_ABBR[per[3].toLowerCase()];
    if (m1 && m2) {
      out.dataInizio = {
        valore: `${per[2]}-${String(m1).padStart(2, "0")}-01`,
        conf: "incerto"
      };
      out.dataFine = {
        valore: `${per[4]}-${String(m2).padStart(2, "0")}-${ultimoGiorno(+per[4], m2)}`,
        conf: "incerto"
      };
    } else {
      out.dataInizio = vuoto();
      out.dataFine = vuoto();
    }
  } else {
    out.dataInizio = vuoto();
    out.dataFine = vuoto();
  }
  let cons = tFlat.match(/([\d.]+)\s*Smc\s+Consumi Rilevati/i) || tFlat.match(/Consumo fatturato[\s\S]{0,40}?([\d.]+)\s*Smc/i) || tFlat.match(/Quota consumi\s+([\d.]+)\s*Smc/i);
  out.consumo = cons ? {
    valore: String(parseNumIt(cons[1])),
    conf: "ok"
  } : vuoto();
  let imp = tFlat.match(/TOTALE DA PAGARE\s+([\d.]+,\d{2})/i) || tFlat.match(/Importo da pagare\s+Consumo\s+([\d.]+,\d{2})/i) || tFlat.match(/Importo da pagare[\s\S]{0,30}?([\d.]+,\d{2})/i);
  out.importo = imp ? {
    valore: String(parseNumIt(imp[1])),
    conf: "ok"
  } : vuoto();
  out._tipo = /GAS\s*NATURALE|\bSmc\b/i.test(tFlat) ? "gas" : "elettrico";

  // VERIFICA INCROCIATA (doppia lettura): "TOTALE DA PAGARE" del dettaglio e il
  // riquadro "Importo da pagare" di prima pagina devono coincidere.
  const totA = tFlat.match(/TOTALE DA PAGARE\s+([\d.]+,\d{2})/i);
  const totB = tFlat.match(/Importo da pagare[\s\S]{0,30}?([\d.]+,\d{2})/i);
  if (totA && totB && Math.abs(parseNumIt(totA[1]) - parseNumIt(totB[1])) > 0.005) {
    out.importo.conf = "incerto";
    out._avvisoExtra = `Importo discordante tra le sezioni della bolletta (${totA[1]} vs ${totB[1]} €): verifica sul PDF.`;
  }
  const scad = tFlat.match(/Scadenza\s+(\d{2}\/\d{2}\/\d{4})/i);
  out.scadenza = scad ? {
    valore: toISO(scad[1]),
    conf: "ok"
  } : vuoto();
  const nf = tFlat.match(/fattura elettronica n\.\s*(\d+)/i);
  out.numero = nf ? {
    valore: nf[1],
    conf: "ok"
  } : vuoto();
  const qf = tFlat.match(/QUOTA FISSA\s+([\d.]+,\d{2})/i);
  out.quotaFissa = qf ? {
    valore: String(parseNumIt(qf[1])),
    conf: "incerto"
  } : vuoto();
  out._depositoCauzionale = /DEPOSITO CAUZIONALE/i.test(tFlat);
  return out;
}

/* PARSER ACQUE SPA (servizio idrico).
   Codice utenza a 12 cifre, periodo "25/02/2026 - 22/05/2026",
   consumo in mc, scadenza "entro il gg/mm/aaaa". */
function parseAcque(testo) {
  const tFlat = testo.replace(/\s+/g, " ");
  const out = {};
  const cu = tFlat.match(/CODICE UTENZA[:\s]+(\d{10,14})/i);
  out.codice = cu ? {
    valore: cu[1],
    conf: "ok"
  } : vuoto();
  out._tipo = "acqua";

  // il testo estratto può intercalare altre colonne tra etichetta e date:
  // "Periodo di riferimento 6026011000588463 01/06/2026 trimestrale 25/02/2026 - 22/05/2026"
  const per = tFlat.match(/Periodo di riferimento[\s\S]{0,80}?(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})/i) || tFlat.match(/(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})/);
  if (per) {
    out.dataInizio = {
      valore: toISO(per[1]),
      conf: "ok"
    };
    out.dataFine = {
      valore: toISO(per[2]),
      conf: "ok"
    };
  } else {
    out.dataInizio = vuoto();
    out.dataFine = vuoto();
  }
  const cons = tFlat.match(/Consumo fatturato\s+([\d.,]+)\s*mc/i) || tFlat.match(/consumo\s+totale[\s\S]{0,30}?([\d.,]+)\s*mc/i);
  out.consumo = cons ? {
    valore: String(parseNumIt(cons[1])),
    conf: "ok"
  } : vuoto();
  const imp = tFlat.match(/TOTALE FATTURA\s+([\d.]+,\d{2})/i) || tFlat.match(/TOTALE DA PAGARE\s+([\d.]+,\d{2})/i);
  out.importo = imp ? {
    valore: String(parseNumIt(imp[1])),
    conf: "ok"
  } : vuoto();

  // VERIFICA INCROCIATA (doppia lettura): "TOTALE FATTURA" e "TOTALE DA PAGARE" devono coincidere.
  const totF = tFlat.match(/TOTALE FATTURA\s+([\d.]+,\d{2})/i);
  const totP = tFlat.match(/TOTALE DA PAGARE\s+([\d.]+,\d{2})/i);
  if (totF && totP && Math.abs(parseNumIt(totF[1]) - parseNumIt(totP[1])) > 0.005) {
    out.importo.conf = "incerto";
    out._avvisoExtra = `Importo discordante tra TOTALE FATTURA (${totF[1]} €) e TOTALE DA PAGARE (${totP[1]} €): verifica sul PDF.`;
  }
  const scad = tFlat.match(/entro il\s+(\d{2}\/\d{2}\/\d{4})/i);
  out.scadenza = scad ? {
    valore: toISO(scad[1]),
    conf: "ok"
  } : vuoto();
  const nf = tFlat.match(/Numero Fattura\s+(\d+)/i) || tFlat.match(/Bolletta n\.\s*(\d+)/i);
  out.numero = nf ? {
    valore: nf[1],
    conf: "ok"
  } : vuoto();
  const qf = tFlat.match(/QUOTA FISSA\s+([\d.]+,\d{2})/i);
  out.quotaFissa = qf ? {
    valore: String(parseNumIt(qf[1])),
    conf: "incerto"
  } : vuoto();

  // Avvisi specifici del servizio idrico
  if (/Stima/i.test(tFlat) && /IN ACCONTO/i.test(tFlat)) {
    out._avvisoExtra = (out._avvisoExtra ? out._avvisoExtra + " " : "") + "Bolletta in ACCONTO su consumo STIMATO: l'importo verrà conguagliato con la prossima lettura reale.";
  }
  const insoluti = tFlat.match(/n[°o]\s*(\d+)\s+documenti precedenti per un totale di euro\s+([\d.]+,\d{2})\s+non pagati/i);
  if (insoluti) {
    out._avvisoExtra = (out._avvisoExtra ? out._avvisoExtra + " " : "") + `Attenzione: il fornitore segnala ${insoluti[1]} fattur${insoluti[1] === "1" ? "a precedente non pagata" : "e precedenti non pagate"} per ${insoluti[2]} €.`;
  }
  return out;
}

/* DISPATCHER: riconosce il fornitore e applica il parser dedicato. */
function parseBolletta(testo) {
  const fornitore = riconosciFornitore(testo);
  let campi;
  if (fornitore === "energentium") campi = parseEnergentium(testo);else if (fornitore === "enel") campi = parseEnel(testo);else if (fornitore === "acque") campi = parseAcque(testo);else campi = {
    codice: vuoto(),
    dataInizio: vuoto(),
    dataFine: vuoto(),
    consumo: vuoto(),
    importo: vuoto(),
    numero: vuoto(),
    scadenza: vuoto(),
    quotaFissa: vuoto()
  };
  campi._fornitore = fornitore;
  return campi;
}

/* VALIDAZIONE: controlla coerenza e produce avvisi.
   È la "verifica" che impedisce salvataggi sbagliati in silenzio.
   tipoUtenza (opzionale) è il tipo dell'utenza abbinata, per il controllo incrociato. */
function validaEstrazione(campi, tipoUtenza) {
  const avvisi = [];
  const di = campi.dataInizio?.valore,
    df = campi.dataFine?.valore;

/* RIPIEGO AI: chiama Claude solo su richiesta esplicita.

async function leggiConAI(file) {
  if (!isClaude) {
    throw new Error("La lettura con AI è disponibile solo dentro Claude. Qui usa la lettura locale o inserisci i dati a mano.");
  }
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Lettura del file non riuscita"));
    r.readAsDataURL(file);
  });
  const prompt = `Sei un estrattore di dati da bollette di energia elettrica o gas. Leggi il PDF e restituisci ESCLUSIVAMENTE un oggetto JSON, senza testo prima o dopo, senza backtick, con questi campi:
{"codice": "POD (IT001E...) o PDR (14-15 cifre)", "dataInizio": "yyyy-mm-dd inizio periodo", "dataFine": "yyyy-mm-dd fine periodo", "consumo": numero del consumo in kWh o Smc, "importo": numero totale in euro, "numero": "numero fattura"}
Se un campo non è presente, usa stringa vuota o null. Usa il punto come separatore decimale.`;
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [{
          type: "document",
          source: {
            type: "base64",
            media_type: "application/pdf",
            data: base64
          }
        }, {
          type: "text",
          text: prompt
        }]
      }]
    })
  });
  const data = await resp.json();
  const txt = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("").replace(/```json|```/g, "").trim();
  const j = JSON.parse(txt);
  const wrap = v => ({
    valore: v == null ? "" : String(v),
    conf: "ai"
  });
  return {
    codice: wrap(j.codice),
    dataInizio: wrap(j.dataInizio),
    dataFine: wrap(j.dataFine),
    consumo: wrap(j.consumo),
    importo: wrap(j.importo),
    numero: wrap(j.numero)
  };
}
